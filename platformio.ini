; Alarm-button firmware — ESP32-S3 (Axiometa Genesis Mini)
; Host-testable core (lib/alarmcore) + two HW variants via env.
[platformio]
default_envs = native

; --- Host tests (no ESP32 needed): only lib/ + test/, src/ excluded ---
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17
build_src_filter = -<*>
lib_deps = bblanchon/ArduinoJson@^7.4.1

; --- Target hardware: ESP32-S3 Genesis Mini ---
[env:axiometa-mini]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; Genesis Mini has 4 MB flash (the devkit profile defaults to 8 MB → boot loop:
; "Detected size(4096k) smaller than ... image header(8192k)"). Pin it to 4 MB.
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = default.csv
; ESP32-S3 native USB-CDC: route Serial over the USB port (not UART0)
build_flags = -std=gnu++17 -DVARIANT_AXIOMETA_MINI -DARDUINO_USB_CDC_ON_BOOT=1 -DARDUINO_USB_MODE=1 -Ilib
lib_deps =
  bblanchon/ArduinoJson@^7.4.1
  adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
  256dpi/MQTT@^2.5.2

; --- Standalone hardware self-test probe (not the firmware) ---
; Flash to a fresh Genesis Mini to verify wiring of all 4 modules; drive over serial
; @115200 ('h' for help). Source lives in tools/hw-bringup/, not src/, so it never
; collides with the real firmware. Build/flash: pio run -e bringup -t upload
[env:bringup]
extends = env:axiometa-mini
build_src_filter = -<*> +<../tools/hw-bringup/>
