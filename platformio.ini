; Alarm-button firmware — ESP32-S3 (Axiometa Genesis Mini)
; Host-testable core (lib/alarmcore) + two HW variants via env.
[platformio]
default_envs = native

; --- Host tests (no ESP32 needed): only lib/ + test/, src/ excluded ---
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17
build_src_filter = -<*>
lib_deps = bblanchon/ArduinoJson@^7.4.1

; --- Target hardware: ESP32-S3 Genesis Mini ---
[env:axiometa-mini]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags = -std=gnu++17 -DVARIANT_AXIOMETA_MINI
lib_deps = bblanchon/ArduinoJson@^7.4.1
