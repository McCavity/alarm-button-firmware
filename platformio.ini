; Alarm-Button-Firmware — ESP32-S3 (Axiometa Genesis Mini)
; Host-testbarer Core (lib/alarmcore) + zwei HW-Varianten via Env.
[platformio]
default_envs = native

; --- Host-Tests (kein ESP32 nötig): nur lib/ + test/, src/ ausgeschlossen ---
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17
build_src_filter = -<*>
lib_deps = bblanchon/ArduinoJson@^7.4.1

; --- Zielhardware: ESP32-S3 Genesis Mini ---
[env:axiometa-mini]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags = -std=gnu++17 -DVARIANT_AXIOMETA_MINI
lib_deps = bblanchon/ArduinoJson@^7.4.1
